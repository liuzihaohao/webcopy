<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Copy</title>
		<link rel="stylesheet" href="/static/css/bootstrap.min.css" />
		<script src="/static/js/jquery.min.js"></script>
		<script src="/static/js/bootstrap.min.js"></script>
		<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
		<style>
			body{
				margin-top: 50px;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<nav class="navbar navbar-static-top navbar-fixed-top navbar-default navbar-inverse">
				<div class="container">
					<div class="navbar-header">
						<a href="" class="navbar-brand">{{titles}}</a>
						<button class="navbar-toggle collapsed" data-toggle="collapse" data-target="#mynavbar">
							<span class="icon-bar"></span>
							<span class="icon-bar"></span>
							<span class="icon-bar"></span>
						</button>
					</div>
					<div id="mynavbar" class="collapse navbar-collapse">
						<ul class="nav navbar-nav">
							<li><a href="#fileup">上传文件</a></li>
							<li><a href="#textup">上传文字</a></li>
							<!-- <li><a href="">关于</a></li> -->
						</ul>
						<form class="navbar-form navbar-left" role="search" method="get" action="/seachdb/">
							<div class="form-group">
								<input type="text" class="form-control" placeholder="提取文件" name="code">
							</div>
							{% csrf_token %}
							<button type="submit" class="btn btn-info"><span class="glyphicon glyphicon glyphicon-floppy-open"></span></button>
						</form>
					</div>
				</div>
            </nav>
            <!--  -->
			{% if ifbigtext %}
			<script>window.onload=function(){$("#bigtext").click()}</script>
			<button id='bigtext' style="display: none;" type="button" class="btn btn-primary" data-toggle="modal" data-target=".bs-example-modal-lg">Large modal</button>
			<div class="modal fade bs-example-modal-lg" tabindex="-1" role="dialog" aria-labelledby="myLargeModalLabel">
			<div class="modal-dialog modal-lg" role="document">
			<div class="modal-content">{{bigtext|linebreaksbr}}<a href="{{bigfile}}">{{filetext}}</a></div></div>
			</div>
			{% endif %}
			{% if ifcode %}
			<div class="bs-example bs-example-standalone" data-example-id="dismissible-alert-js">
			<div class="alert alert-warning alert-dismissible fade in" role="alert">
			<button type="button" class="close" data-dismiss="alert" aria-label="Close"><span aria-hidden="true">×</span></button>
			代码为<strong>{{codes}}</strong>
			</div>
			</div>
			{% endif %}
            <!--  -->
            <h1 id="textup">上传文字</h1>
            <form method="post" action="/uptext/">
				{% csrf_token %}
                <textarea name="text" style="width: 100%;height: 150px;"></textarea>
                <button class="btn btn-success" style="width: 100%;">提交</button>
            </form>
            <h1 id="fileup">上传文件</h1>
            <form enctype="multipart/form-data" method="post" action="/upfile/">
				{% csrf_token %}
                <input type="file" name="file">
                <button class="btn btn-success" style="margin-top: 10px;">提交</button>
            </form>
        </div>
    </body>
</html>
